# Qwen3-VL + Regression Head for Robot Manipulation
model:
  name: "Qwen/Qwen3-VL-Embedding-8B"
  freeze_vision: true
  freeze_llm: false
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  use_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

data:
  dataset_name: "lerobot/bridge_dataset"
  data_dir: "./data"
  history_frames: 4
  action_dim: 7
  action_horizon: 10
  image_size: [224, 224]
  normalize_actions: true
  train_split: 0.9

training:
  output_dir: "./checkpoints"
  num_epochs: 2
  batch_size: 24
  gradient_accumulation_steps: 1
  learning_rate: 1e-4
  weight_decay: 0.01
  lr_scheduler: "cosine"
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: false
  save_steps: 1500
  eval_steps: 1500
  logging_steps: 10
  dataloader_num_workers: 4
  seed: 42
  temporal_smooth_weight: 0.01
  gripper_weight: 10.0
  gaussian_noise: 0.01
  restart_lr: false
  inherit_weights_from: ""
